name: Feature request
description: Propose an enhancement or new capability
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What user or contributor pain does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Stage do instead?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope notes
      description: What is explicitly out of scope for this request?
